<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLUMEN AI</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #branding { display: flex; flex-direction: column; justify-content: center; align-items: center; flex-grow: 1; text-align: center; }
        .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: 4px; }
        
        #result-area { display: none; padding: 20px; overflow-y: auto; flex-grow: 1; margin-bottom: 100px; }
        #solution { max-width: 600px; margin: 20px auto; line-height: 1.7; white-space: pre-wrap; }

        .search-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #111; border: 1px solid #333; border-radius: 30px; display: flex; padding: 10px 20px; align-items: center; }
        #user-input { background: transparent; border: none; color: white; flex-grow: 1; outline: none; font-size: 1rem; }
        .btn { background: transparent; border: none; color: #888; font-size: 1.2rem; cursor: pointer; padding: 0 10px; }
    </style>
</head>
<body>

    <audio id="my-voice" src="{{ url_for('static', filename='welcome.mp3') }}"></audio>

    <div id="branding"><div class="logo">LLUMEN AI</div></div>
    <div id="result-area"><div id="solution"></div></div>

    <div class="search-container">
        <button class="btn" onclick="startVoice()">🎤</button>
        <input type="text" id="user-input" placeholder="Ask LLUMEN..." autocomplete="off">
        <button class="btn" onclick="askLumen()">↑</button>
    </div>

    <script>
        // 1. Play your voice on the first screen click
        document.body.addEventListener('click', () => {
            const audio = document.getElementById('my-voice');
            audio.play().catch(e => console.log("Audio play blocked: ", e));
        }, { once: true });

        // 2. Microphone Logic
        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'en-IN';
            rec.onresult = (e) => { 
                document.getElementById('user-input').value = e.results[0][0].transcript; 
            };
            rec.start();
        }

        // 3. Search Logic (Kept your existing brain logic)
        async function askLumen() {
            const input = document.getElementById('user-input');
            if (!input.value.trim()) return;
            
            document.getElementById('branding').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('solution').innerText = "Processing...";
            
            const res = await fetch('/api/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: input.value})
            });
            const data = await res.json();
            document.getElementById('solution').innerText = data.solution;
            input.value = "";
        }
        
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') askLumen(); });
    </script>
</body>
</html>
