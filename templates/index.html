<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLUMEN AI</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #branding { display: flex; flex-direction: column; justify-content: center; align-items: center; flex-grow: 1; text-align: center; }
        .user-tag { color: #007bff; font-weight: bold; margin-bottom: 5px; }
        .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: 4px; margin: 10px 0; }
        .motto { opacity: 0.7; font-size: 0.9rem; line-height: 1.6; }

        #result-area { display: none; padding: 20px; overflow-y: auto; flex-grow: 1; margin-bottom: 100px; }
        #solution { max-width: 600px; margin: 20px auto; line-height: 1.7; white-space: pre-wrap; }

        .search-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #111; border: 1px solid #333; border-radius: 30px; display: flex; padding: 10px 20px; align-items: center; }
        #user-input { background: transparent; border: none; color: white; flex-grow: 1; outline: none; font-size: 1rem; }
        .btn { background: transparent; border: none; color: #888; font-size: 1.2rem; cursor: pointer; padding: 0 10px; }
        .send-btn { color: #007bff; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="branding">
        <div class="user-tag">KAIF</div>
        <div class="logo">LLUMEN AI</div>
        <div class="motto">SPEND YOUR TIME ❌<br>INVEST YOUR TIME ✅</div>
    </div>

    <div id="result-area">
        <div id="solution"></div>
    </div>

    <div class="search-container">
        <button class="btn" id="mic-btn" onclick="startVoice()">🎤</button>
        <input type="text" id="user-input" placeholder="Ask LLUMEN..." autocomplete="off">
        <button class="btn send-btn" onclick="askLumen()">↑</button>
    </div>

    <script>
        // --- VOICE LOGIC ---
        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-IN';
            recognition.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
            recognition.start();
        }

        // --- SEARCH LOGIC ---
        async function askLumen() {
            const input = document.getElementById('user-input');
            const branding = document.getElementById('branding');
            const resultArea = document.getElementById('result-area');
            const solution = document.getElementById('solution');
            
            if (!input.value.trim()) return;

            branding.style.display = 'none';
            resultArea.style.display = 'block';
            solution.innerHTML = "Processing...";

            const res = await fetch('/api/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: input.value})
            });
            const data = await res.json();
            solution.innerHTML = data.solution;
            input.value = "";
        }
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') askLumen(); });
    </script>
</body>
</html>
