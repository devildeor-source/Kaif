<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLUMEN AI</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #branding { display: flex; flex-direction: column; justify-content: center; align-items: center; flex-grow: 1; text-align: center; }
        .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: 4px; color: #fff; }
        #result-area { display: none; padding: 20px; overflow-y: auto; flex-grow: 1; margin-bottom: 100px; }
        #solution { max-width: 600px; margin: 20px auto; line-height: 1.7; white-space: pre-wrap; color: #ddd; }
        .search-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #111; border: 1px solid #333; border-radius: 30px; display: flex; padding: 10px 20px; align-items: center; z-index: 10; }
        #user-input { background: transparent; border: none; color: white; flex-grow: 1; outline: none; font-size: 1rem; padding-left: 10px; }
        .btn { background: transparent; border: none; color: #888; font-size: 1.2rem; cursor: pointer; padding: 0 10px; transition: 0.3s; }
        .btn:disabled { color: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="branding"><div class="logo">LLUMEN AI</div></div>
    <div id="result-area"><div id="solution"></div></div>

    <div class="search-container">
        <button class="btn" onclick="startVoice()">🎤</button>
        <input type="text" id="user-input" placeholder="Ask LLUMEN..." autocomplete="off">
        <button class="btn" onclick="askLumen()">↑</button>
    </div>

    <script>
        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'en-IN';
            rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
            rec.start();
        }

        async function askLumen() {
            const input = document.getElementById('user-input');
            const btn = document.querySelector('button[onclick="askLumen()"]');
            const sol = document.getElementById('solution');
            
            if (!input.value.trim()) return;

            btn.disabled = true;
            document.getElementById('branding').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            sol.innerText = "LLUMEN is thinking...";
            
            try {
                // FORCE: cache: 'no-store' prevents the browser from loading old error messages
                const res = await fetch('/api/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    cache: 'no-store',
                    body: JSON.stringify({query: input.value})
                });
                
                if (res.status === 503) {
                    sol.innerText = "API Limit reached. Please wait for the cooldown.";
                    setTimeout(() => { 
                        sol.innerText = ""; 
                        btn.disabled = false; 
                    }, 5000); 
                } else if (res.ok) {
                    const data = await res.json();
                    sol.innerText = data.solution;
                    btn.disabled = false;
                }
            } catch (e) {
                sol.innerText = "Connection error.";
                btn.disabled = false;
            }
            input.value = "";
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') askLumen(); 
        });
    </script>
</body>
</html>
